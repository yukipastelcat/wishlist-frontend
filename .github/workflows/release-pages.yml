name: Release Deploy Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Install static adapter
        run: npm install --no-save @sveltejs/adapter-static

      - name: Build
        run: npm run build
        env:
          BUILD_TARGET: github-pages
          VITE_AUTH_API_URL: ${{ vars.VITE_AUTH_API_URL }}
          VITE_GIFTS_API_URL: ${{ vars.VITE_GIFTS_API_URL }}

      - name: Write CNAME
        if: vars.PAGES_DOMAIN != ''
        run: echo "${{ vars.PAGES_DOMAIN }}" > build/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

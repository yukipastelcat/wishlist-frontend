<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">

  <defs>
    <symbol id="gift" viewBox="0 0 24 24">
      <rect x="3" y="8" width="18" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></rect>
      <path d="M12 8v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
    </symbol>

    <pattern id="giftPattern" width="160" height="160" patternUnits="userSpaceOnUse">

      <!-- center icons -->
      <use href="#gift" x="28" y="30" width="24" height="24" transform="rotate(-10 40 42)"></use>
      <use href="#gift" x="80" y="20" width="22" height="22" transform="rotate(8 91 31)"></use>
      <use href="#gift" x="60" y="90" width="23" height="23" transform="rotate(-6 72 102)"></use>
      <use href="#gift" x="110" y="70" width="22" height="22" transform="rotate(12 121 81)"></use>

      <!-- edge wrapping example -->
      <!-- left crossing -->
      <use href="#gift" x="-10" y="60" width="24" height="24" transform="rotate(-8 2 72)"></use>
      <use href="#gift" x="150" y="60" width="24" height="24" transform="rotate(-8 162 72)"></use>

      <!-- top crossing -->
      <use href="#gift" x="40" y="-12" width="24" height="24" transform="rotate(7 52 0)"></use>
      <use href="#gift" x="40" y="148" width="24" height="24" transform="rotate(7 52 160)"></use>

      <!-- corner crossing -->
      <use href="#gift" x="-12" y="-10" width="24" height="24" transform="rotate(9 0 2)"></use>
      <use href="#gift" x="148" y="-10" width="24" height="24" transform="rotate(9 160 2)"></use>
      <use href="#gift" x="-12" y="150" width="24" height="24" transform="rotate(9 0 162)"></use>
      <use href="#gift" x="148" y="150" width="24" height="24" transform="rotate(9 160 162)"></use>

    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#giftPattern)"></rect>

</svg>